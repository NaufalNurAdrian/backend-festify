steps:
  # 1. Install dependencies
  - name: "node:20"
    entrypoint: "npm"
    args: ["install"]

  # 2. Prisma generate
  - name: "node:20"
    entrypoint: "npx"
    args: ["prisma", "generate"]

  # 3. MIGRATION STEP (INI YANG KAMU BUTUHKAN)
  - name: "node:20"
    entrypoint: "npx"
    args: ["prisma", "migrate", "deploy"]
    env:
      - DATABASE_URL=${_DATABASE_URL}

  # 4. Build project
  - name: "node:20"
    entrypoint: "npm"
    args: ["run", "build"]

  # 5. Deploy ke Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - front-end-festify
      - --image
      - gcr.io/$PROJECT_ID/festify-api
      - --region
      - asia-southeast2
      - --platform
      - managed